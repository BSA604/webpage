<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery - BSA Troop 604</title>
  <link rel="stylesheet" href="/css/gallery.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="nav-title">BSA Troop 604 Photo Gallery</h1>
      <div class="nav-links">
        <a href="/">Home</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="gallery-header">
      <h2>Gallery</h2>
      <p>Browse photos from our troop events.</p>
    </div>

    <section class="filter-section">
      <div class="filter-controls">
        <label for="eventFilter">Select Event:</label>
        <select id="eventFilter">
          <option value="">Loading events...</option>
        </select>
      </div>
    </section>

    <section class="gallery-section">
      <div id="galleryContainer" class="gallery-grid">
        <div class="loading">Loading photos...</div>
      </div>
    </section>
  </main>

  <div>Test space
    <img src="https://res.cloudinary.com/drex1jrqe/image/upload/v1776862662_butrlk.jpg" alt="Test Image" />
  </div>
  <footer>
    <p>&copy; 2024 BSA Troop 604. All rights reserved.</p>
  </footer>

  <script src="/js/gallery.js"></script>
</body>
</html>
